# version: '3.8' ← 書かなくてもOK
services:
  app:
    build: ./docker/php # カスタムPHP環境を構築
    volumes:
      - ./src:/var/www/html
    working_dir: /var/www/html

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
